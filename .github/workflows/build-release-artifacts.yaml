name: Build Release Artifacts
on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build-android:
    name: Build Android
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file
        shell: bash
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "Warning: ENV_FILE secret not provided"
          fi
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Setup Android Keystore
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo $KEYSTORE_BASE64 | base64 --decode > android/upload-keystore.jks
            echo "storePassword=$STORE_PASSWORD" > android/key.properties
            echo "keyPassword=$KEY_PASSWORD" >> android/key.properties
            echo "keyAlias=$KEY_ALIAS" >> android/key.properties
            echo "storeFile=upload-keystore.jks" >> android/key.properties
          fi
      - name: Build Android Release
        run: flutter build apk --release
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/app/outputs/flutter-apk/app-release.apk

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create .env file
        shell: bash
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
        run: |
          if [ -n "$ENV_FILE" ]; then
            echo "$ENV_FILE" > .env
          else
            echo "Warning: ENV_FILE secret not provided"
          fi
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true
      - name: Enable Windows Desktop
        run: flutter config --enable-windows-desktop
      - name: Build Windows Release
        run: flutter build windows --release
      - name: Compile Inno Setup Script
        uses: dsaltares/inno-setup-action@master
        with:
          path: windows/inno_setup.iss
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/windows/installer/PAPs_n_POPs_Installer.exe
